# discourse/app.yml — template (substituir valores em MAIÚSCULO no VPS)
# NÃO commitar com senhas reais — este arquivo é só template de referência
templates:
  - "templates/postgres.template.yml"
  - "templates/redis.template.yml"
  - "templates/web.template.yml"
  - "templates/web.ratelimited.template.yml"

expose:
  - "127.0.0.1:9001:80"   # porta 9001 — Traefik do Coolify proxy para aqui

params:
  db_default_text_search_config: "pg_catalog.portuguese"
  db_shared_buffers: "256MB"
  db_work_mem: "40MB"

env:
  LC_ALL: en_US.UTF-8
  LANG: en_US.UTF-8
  LANGUAGE: en_US.UTF-8
  DISCOURSE_DEFAULT_LOCALE: pt_BR

  DISCOURSE_HOSTNAME: normatizado.com.br
  DISCOURSE_RELATIVE_URL_ROOT: /forum

  DISCOURSE_DEVELOPER_EMAILS: "eniosoeiro@gmail.com"

  # Amazon SES SMTP
  DISCOURSE_SMTP_ADDRESS: "email-smtp.us-east-1.amazonaws.com"
  DISCOURSE_SMTP_PORT: 587
  DISCOURSE_SMTP_USER_NAME: "SES_SMTP_KEY_ID"      # substituir: Access Key ID do IAM user
  DISCOURSE_SMTP_PASSWORD: "SES_SMTP_SECRET"        # substituir: SMTP password derivada (script Python)
  DISCOURSE_SMTP_ENABLE_START_TLS: true
  DISCOURSE_SMTP_DOMAIN: "normatizado.com.br"
  DISCOURSE_NOTIFICATION_EMAIL: "noreply@normatizado.com.br"

  DISCOURSE_CDN_URL: "https://normatizado.com.br"

  # Backblaze B2 backup (S3-compatible) — ativar após criar bucket e App Key
  #DISCOURSE_S3_BACKUP_BUCKET: "normatizado-backups"
  #DISCOURSE_S3_REGION: "us-west-004"
  #DISCOURSE_S3_ACCESS_KEY_ID: "B2_KEY_ID"
  #DISCOURSE_S3_SECRET_ACCESS_KEY: "B2_APP_KEY"
  #DISCOURSE_S3_ENDPOINT: "https://s3.us-west-004.backblazeb2.com"
  #DISCOURSE_BACKUP_LOCATION: "s3"

hooks:
  after_code:
    - exec:
        cd: $home/plugins
        cmd:
          # discourse-solved, discourse-math, discourse-data-explorer, discourse-checklist
          # estão BUNDLED no Discourse — não incluir aqui
          - git clone https://github.com/discourse/discourse-akismet.git

volumes:
  - volume:
      host: /var/discourse/shared/standalone
      guest: /shared
  - volume:
      host: /var/discourse/shared/standalone/log/var-log
      guest: /var/log

run:
  - exec: echo "Beginning of custom commands"
  - exec: rails runner "SiteSetting.force_https = true"
